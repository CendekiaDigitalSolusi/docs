<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <style>
      .title{font:700 28px Arial,sans-serif;fill:#4a2d00}
      .box{fill:#fff9ef;stroke:#d08a00;stroke-width:3;rx:16}
      .txt{font:600 20px Arial,sans-serif;fill:#4a2d00}
      .sub{font:400 16px Arial,sans-serif;fill:#7a5a28}
      .arr{stroke:#d08a00;stroke-width:4;fill:none;marker-end:url(#a)}
    </style>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#d08a00" />
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#fff4dd"/>
  <text x="60" y="70" class="title">Alur Reset Kata Sandi</text>

  <rect x="70" y="140" width="210" height="210" class="box"/>
  <text x="95" y="205" class="txt">1. Klik</text>
  <text x="95" y="235" class="txt">Lupa Kata Sandi</text>

  <rect x="315" y="140" width="210" height="210" class="box"/>
  <text x="345" y="205" class="txt">2. Isi Email</text>
  <text x="345" y="237" class="sub">Kirim link reset</text>

  <rect x="560" y="140" width="210" height="210" class="box"/>
  <text x="585" y="205" class="txt">3. Buka Email</text>
  <text x="585" y="237" class="sub">Klik link reset</text>

  <rect x="805" y="140" width="210" height="210" class="box"/>
  <text x="835" y="205" class="txt">4. Buat</text>
  <text x="835" y="235" class="txt">Password Baru</text>

  <rect x="1040" y="140" width="130" height="210" class="box"/>
  <text x="1060" y="205" class="txt">5. Login</text>
  <text x="1060" y="237" class="sub">Ulang</text>

  <path d="M280 245 L310 245" class="arr"/>
  <path d="M525 245 L555 245" class="arr"/>
  <path d="M770 245 L800 245" class="arr"/>
  <path d="M1015 245 L1035 245" class="arr"/>
</svg>
